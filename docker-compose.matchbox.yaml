services:
  matchbox:
    image: europe-west6-docker.pkg.dev/ahdis-ch/ahdis/matchbox:latest
    ports:
      - "8080:8080"
    volumes:
      - ./scripts/matchbox/application.yaml:/config/application.yaml
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx4g"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/fhir/metadata"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
