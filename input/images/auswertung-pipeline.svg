<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0077B6"/>
    </marker>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0077B6">Auswertungspipeline: Von FHIR-Daten zu Ergebnissen</text>

  <!-- ============================================================ -->
  <!-- Step 1: FHIR-Daten -->
  <!-- ============================================================ -->
  <rect x="20" y="50" width="180" height="140" rx="8" fill="#0077B6" filter="url(#sh)"/>
  <text x="110" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">FHIR-Repository</text>
  <line x1="35" y1="80" x2="185" y2="80" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>

  <rect x="35" y="88" width="150" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="110" y="101" text-anchor="middle" font-size="8.5" fill="#ffffff">Patient</text>
  <rect x="35" y="110" width="150" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="110" y="123" text-anchor="middle" font-size="8.5" fill="#ffffff">Condition (Diagnose)</text>
  <rect x="35" y="132" width="150" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="110" y="145" text-anchor="middle" font-size="8.5" fill="#ffffff">Procedure (OP, Therapie)</text>
  <rect x="35" y="154" width="150" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="110" y="167" text-anchor="middle" font-size="8.5" fill="#ffffff">Observation, DiagnosticReport</text>

  <!-- Arrow →  -->
  <line x1="200" y1="120" x2="235" y2="120" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============================================================ -->
  <!-- Step 2: Kohortendefinition -->
  <!-- ============================================================ -->
  <rect x="240" y="50" width="240" height="200" rx="8" fill="#E8F4F8" stroke="#0077B6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="360" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#0077B6">Kohortendefinition</text>
  <line x1="255" y1="80" x2="465" y2="80" stroke="#B0D4E3" stroke-width="1"/>

  <!-- Einschlusskriterien -->
  <text x="260" y="98" font-size="10" font-weight="bold" fill="#005F8A">Einschlusskriterien</text>
  <rect x="260" y="104" width="200" height="16" rx="3" fill="#ffffff" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="268" y="115" font-size="8" fill="#555555">Diagnose: Mammakarzinom (C50.*)</text>
  <rect x="260" y="124" width="200" height="16" rx="3" fill="#ffffff" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="268" y="135" font-size="8" fill="#555555">Zeitraum: 2024-01-01 bis 2025-12-31</text>
  <rect x="260" y="144" width="200" height="16" rx="3" fill="#ffffff" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="268" y="155" font-size="8" fill="#555555">OP durchgeführt (Procedure.status = completed)</text>

  <!-- Ausschlusskriterien -->
  <text x="260" y="177" font-size="10" font-weight="bold" fill="#005F8A">Ausschlusskriterien</text>
  <rect x="260" y="183" width="200" height="16" rx="3" fill="#ffffff" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="268" y="194" font-size="8" fill="#555555">Fernmetastasen bei Erstdiagnose (cM1)</text>
  <rect x="260" y="203" width="200" height="16" rx="3" fill="#ffffff" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="268" y="214" font-size="8" fill="#555555">Männliches Mammakarzinom (optional)</text>
  <rect x="260" y="223" width="200" height="16" rx="3" fill="#ffffff" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="268" y="234" font-size="8" fill="#555555">Neoadjuvante Vortherapie (optional)</text>

  <!-- Arrow → -->
  <line x1="480" y1="120" x2="515" y2="120" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="498" y="112" text-anchor="middle" font-size="8" fill="#555555" font-style="italic">Filter</text>

  <!-- ============================================================ -->
  <!-- Step 3: ViewDefinitions / Projektion -->
  <!-- ============================================================ -->
  <rect x="520" y="50" width="195" height="200" rx="8" fill="#005F8A" filter="url(#sh)"/>
  <text x="617" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Tabellarische Projektion</text>
  <line x1="535" y1="80" x2="700" y2="80" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>

  <text x="617" y="97" text-anchor="middle" font-size="9" fill="#E8F4F8" font-weight="bold">SQL on FHIR ViewDefinitions</text>

  <rect x="535" y="105" width="170" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="620" y="118" text-anchor="middle" font-size="8" fill="#ffffff">PatientKohorte</text>
  <rect x="535" y="127" width="170" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="620" y="140" text-anchor="middle" font-size="8" fill="#ffffff">DiagnoseKohorte</text>
  <rect x="535" y="149" width="170" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="620" y="162" text-anchor="middle" font-size="8" fill="#ffffff">OperationenKohorte</text>
  <rect x="535" y="171" width="170" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="620" y="184" text-anchor="middle" font-size="8" fill="#ffffff">PathologieKohorte</text>
  <rect x="535" y="193" width="170" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="620" y="206" text-anchor="middle" font-size="8" fill="#ffffff">SystemtherapieKohorte</text>
  <rect x="535" y="215" width="170" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="620" y="228" text-anchor="middle" font-size="8" fill="#ffffff">TumorboardKohorte</text>

  <!-- Arrow → -->
  <line x1="715" y1="120" x2="750" y2="120" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============================================================ -->
  <!-- Step 4: Kalkulation -->
  <!-- ============================================================ -->
  <rect x="755" y="50" width="130" height="200" rx="8" fill="#E8F4F8" stroke="#0077B6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="820" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#0077B6">Kalkulation</text>
  <line x1="765" y1="80" x2="875" y2="80" stroke="#B0D4E3" stroke-width="1"/>

  <rect x="765" y="90" width="110" height="30" rx="4" fill="#0077B6"/>
  <text x="820" y="104" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#ffffff">CQL Measures</text>
  <text x="820" y="115" text-anchor="middle" font-size="7" fill="#E8F4F8">Qualitätsindikatoren</text>

  <rect x="765" y="128" width="110" height="30" rx="4" fill="#0077B6"/>
  <text x="820" y="142" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#ffffff">SQL / Pandas</text>
  <text x="820" y="153" text-anchor="middle" font-size="7" fill="#E8F4F8">Deskriptive Statistik</text>

  <rect x="765" y="166" width="110" height="30" rx="4" fill="#0077B6"/>
  <text x="820" y="180" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#ffffff">BI-Tools</text>
  <text x="820" y="191" text-anchor="middle" font-size="7" fill="#E8F4F8">Superset, Metabase</text>

  <rect x="765" y="204" width="110" height="30" rx="4" fill="#0077B6"/>
  <text x="820" y="218" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#ffffff">Jupyter Notebook</text>
  <text x="820" y="229" text-anchor="middle" font-size="7" fill="#E8F4F8">Interaktive Analyse</text>

  <!-- ============================================================ -->
  <!-- Bottom: Example - Qualitätsindikator -->
  <!-- ============================================================ -->

  <text x="450" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#0077B6">Beispiel: Qualitätsindikator BET-Rate</text>

  <rect x="20" y="300" width="860" height="165" rx="8" fill="#ffffff" stroke="#B0D4E3" stroke-width="1.5" filter="url(#sh)"/>

  <!-- Step A: Kohorte -->
  <rect x="40" y="315" width="195" height="135" rx="6" fill="#E8F4F8" stroke="#B0D4E3" stroke-width="1"/>
  <text x="137" y="335" text-anchor="middle" font-size="10" font-weight="bold" fill="#005F8A">Kohorte definieren</text>

  <text x="52" y="354" font-size="8.5" fill="#555555">Einschluss:</text>
  <text x="52" y="367" font-size="8" fill="#555555">  Invasives Karzinom (C50.*)</text>
  <text x="52" y="380" font-size="8" fill="#555555">  OP durchgeführt</text>
  <text x="52" y="393" font-size="8" fill="#555555">  cT1–cT2</text>
  <text x="52" y="410" font-size="8.5" fill="#555555">Ausschluss:</text>
  <text x="52" y="423" font-size="8" fill="#555555">  Inflammatorisches Ca</text>
  <text x="52" y="436" font-size="8" fill="#555555">  Multizentrisch</text>

  <!-- Arrow → -->
  <line x1="235" y1="382" x2="270" y2="382" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step B: ViewDefinition -->
  <rect x="275" y="315" width="195" height="135" rx="6" fill="#F0F8FB" stroke="#005F8A" stroke-width="1"/>
  <text x="372" y="335" text-anchor="middle" font-size="10" font-weight="bold" fill="#005F8A">Projektion</text>

  <text x="290" y="354" font-size="8.5" fill="#555555" font-weight="bold">OperationenKohorte:</text>
  <rect x="290" y="360" width="165" height="14" rx="2" fill="#E8F4F8" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="296" y="371" font-size="7.5" fill="#555555">patient_id | op_art | r_status</text>
  <rect x="290" y="378" width="165" height="14" rx="2" fill="#E8F4F8" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="296" y="389" font-size="7.5" fill="#555555">P001  | BET      | R0</text>
  <rect x="290" y="396" width="165" height="14" rx="2" fill="#E8F4F8" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="296" y="407" font-size="7.5" fill="#555555">P002  | Mastekt. | R0</text>
  <rect x="290" y="414" width="165" height="14" rx="2" fill="#E8F4F8" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="296" y="425" font-size="7.5" fill="#555555">P003  | BET      | R0</text>
  <text x="372" y="444" text-anchor="middle" font-size="7.5" fill="#999999">...</text>

  <!-- Arrow → -->
  <line x1="470" y1="382" x2="505" y2="382" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step C: Kalkulation -->
  <rect x="510" y="315" width="175" height="135" rx="6" fill="#005F8A"/>
  <text x="597" y="335" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Kalkulation (CQL)</text>

  <text x="525" y="358" font-size="8.5" fill="#E8F4F8" font-weight="bold">Zähler:</text>
  <text x="525" y="373" font-size="8" fill="#E8F4F8">  OP-Art = BET</text>
  <text x="525" y="393" font-size="8.5" fill="#E8F4F8" font-weight="bold">Nenner:</text>
  <text x="525" y="408" font-size="8" fill="#E8F4F8">  Alle OP in Kohorte</text>
  <text x="525" y="432" font-size="8.5" fill="#E8F4F8" font-weight="bold">Formel:</text>
  <text x="525" y="445" font-size="8" fill="#E8F4F8">  BET-Rate = Zähler / Nenner</text>

  <!-- Arrow → -->
  <line x1="685" y1="382" x2="720" y2="382" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step D: Ergebnis -->
  <rect x="725" y="340" width="140" height="85" rx="6" fill="#E8F4F8" stroke="#0077B6" stroke-width="1.5"/>
  <text x="795" y="362" text-anchor="middle" font-size="10" font-weight="bold" fill="#0077B6">Ergebnis</text>

  <text x="795" y="385" text-anchor="middle" font-size="24" font-weight="bold" fill="#005F8A">78,3%</text>
  <text x="795" y="403" text-anchor="middle" font-size="8.5" fill="#555555">BET-Rate</text>
  <text x="795" y="416" text-anchor="middle" font-size="8" fill="#555555">(S3-Leitlinie: ≥ 70%)</text>
</svg>
