<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0077B6"/>
    </marker>
    <marker id="arr-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#0077B6"/>
    </marker>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0077B6">Datenaustausch im Kerndatensatz Senologie</text>

  <!-- ============================================================ -->
  <!-- Row 1: Clinical Systems -->
  <!-- ============================================================ -->

  <!-- Dokumentationssystem -->
  <rect x="30" y="55" width="200" height="90" rx="8" fill="#0077B6" filter="url(#sh)"/>
  <text x="130" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Dokumentationssystem</text>
  <text x="130" y="96" text-anchor="middle" font-size="9" fill="#E8F4F8">SDC-Questionnaires</text>
  <text x="130" y="110" text-anchor="middle" font-size="9" fill="#E8F4F8">Template-based Extraction</text>
  <text x="130" y="124" text-anchor="middle" font-size="9" fill="#E8F4F8">FHIR-Ressourcen</text>

  <!-- Bidirectional arrow Doku ↔ KIS -->
  <line x1="230" y1="92" x2="310" y2="92" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="310" y1="108" x2="230" y2="108" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="270" y="85" text-anchor="middle" font-size="7.5" fill="#555555">Senologie-Daten</text>
  <text x="270" y="122" text-anchor="middle" font-size="7.5" fill="#555555">Stammdaten</text>

  <!-- KIS -->
  <rect x="310" y="55" width="200" height="90" rx="8" fill="#0077B6" filter="url(#sh)"/>
  <text x="410" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">KIS</text>
  <text x="410" y="96" text-anchor="middle" font-size="9" fill="#E8F4F8">Patient, Encounter</text>
  <text x="410" y="110" text-anchor="middle" font-size="9" fill="#E8F4F8">ISiK-Schnittstelle</text>
  <text x="410" y="124" text-anchor="middle" font-size="9" fill="#E8F4F8">Stammdaten + Befunde</text>

  <!-- ============================================================ -->
  <!-- Row 2: ETL / Integration -->
  <!-- ============================================================ -->

  <!-- Arrow KIS → DIZ -->
  <line x1="410" y1="145" x2="410" y2="195" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="430" y="175" font-size="8" fill="#555555" font-style="italic">ETL (pseudonymisiert)</text>

  <!-- DIZ -->
  <rect x="310" y="200" width="200" height="80" rx="8" fill="#005F8A" filter="url(#sh)"/>
  <text x="410" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Datenintegrationszentrum</text>
  <text x="410" y="240" text-anchor="middle" font-size="9" fill="#E8F4F8">FHIR-Repository</text>
  <text x="410" y="254" text-anchor="middle" font-size="9" fill="#E8F4F8">Pseudonymisierung</text>
  <text x="410" y="268" text-anchor="middle" font-size="9" fill="#E8F4F8">Machbarkeitsabfragen</text>

  <!-- ============================================================ -->
  <!-- Row 2: Meldewege (right side) -->
  <!-- ============================================================ -->

  <!-- Arrow KIS → Meldewege -->
  <line x1="510" y1="100" x2="590" y2="100" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="550" y="92" text-anchor="middle" font-size="7.5" fill="#555555">StructureMaps</text>

  <!-- Meldewege Box -->
  <rect x="590" y="50" width="290" height="200" rx="8" fill="#E8F4F8" stroke="#0077B6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="735" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#0077B6">Meldewege</text>

  <rect x="610" y="84" width="250" height="28" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="625" y="102" font-size="10" font-weight="bold" fill="#005F8A">oBDS</text>
  <text x="672" y="102" font-size="9" fill="#555555">Krebsregister (v3.0.5)</text>

  <rect x="610" y="118" width="250" height="28" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="625" y="136" font-size="10" font-weight="bold" fill="#005F8A">IRegG</text>
  <text x="672" y="136" font-size="9" fill="#555555">Implantateregister (V4.1.1)</text>

  <rect x="610" y="152" width="250" height="28" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="625" y="170" font-size="10" font-weight="bold" fill="#005F8A">IQTIG</text>
  <text x="672" y="170" font-size="9" fill="#555555">QS 18.1 Mammachirurgie</text>

  <rect x="610" y="186" width="250" height="28" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="625" y="204" font-size="10" font-weight="bold" fill="#005F8A">DKG</text>
  <text x="672" y="204" font-size="9" fill="#555555">OncoBox Brust, Zertifizierung</text>

  <!-- Terminologie-Mapping label -->
  <text x="735" y="238" text-anchor="middle" font-size="8" fill="#555555" font-style="italic">ConceptMaps: SNOMED CT → ATC, ICD-10-GM, OPS</text>

  <!-- ============================================================ -->
  <!-- Row 3: Federation / MII -->
  <!-- ============================================================ -->

  <!-- Arrow DIZ → MII -->
  <line x1="410" y1="280" x2="410" y2="310" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- MII Portal -->
  <rect x="260" y="315" width="300" height="65" rx="8" fill="#E8F4F8" stroke="#0077B6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="410" y="338" text-anchor="middle" font-size="11" font-weight="bold" fill="#0077B6">Standortübergreifend (MII)</text>
  <text x="410" y="356" text-anchor="middle" font-size="9" fill="#555555">Föderierte Abfragen · Forschungsdatenportal · Broad Consent</text>
  <text x="410" y="370" text-anchor="middle" font-size="9" fill="#555555">Kompatibel mit MII KDS Onkologie, Pathologie, Bildgebung</text>

  <!-- ePA (future) -->
  <rect x="610" y="315" width="250" height="40" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="735" y="338" text-anchor="middle" font-size="10" fill="#999999">ePA (perspektivisch)</text>
  <text x="735" y="350" text-anchor="middle" font-size="8" fill="#999999">EHDS · ISiK · MIO</text>

  <!-- Arrow DIZ → ePA -->
  <line x1="510" y1="240" x2="610" y2="330" stroke="#B0D4E3" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ISiK label -->
  <rect x="30" y="155" width="80" height="22" rx="4" fill="#E8F4F8" stroke="#B0D4E3" stroke-width="1"/>
  <text x="70" y="170" text-anchor="middle" font-size="8" font-weight="bold" fill="#005F8A">ISiK 5.0</text>
  <line x1="110" y1="166" x2="230" y2="130" stroke="#B0D4E3" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="110" y1="166" x2="310" y2="130" stroke="#B0D4E3" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
