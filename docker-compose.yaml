services:
  aidbox:
    image: healthsamurai/aidboxone:edge
    pull_policy: always
    depends_on:
      aidbox-db:
        condition: service_healthy
    ports:
      - "8888:8888"
    environment:
      AIDBOX_LICENSE: ${AIDBOX_LICENSE}
      AIDBOX_FHIR_VERSION: 4.0.1
      AIDBOX_PORT: 8888
      AIDBOX_BASE_URL: http://localhost:8888
      PGHOST: aidbox-db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: aidbox
      AIDBOX_ADMIN_ID: admin
      AIDBOX_ADMIN_PASSWORD: admin
      AIDBOX_CLIENT_ID: root
      AIDBOX_CLIENT_SECRET: secret
      # Enable FHIR Schema validation
      BOX_FEATURES_VALIDATION_FHIR_SCHEMA_ENABLE: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  aidbox-db:
    image: healthsamurai/aidboxdb:16.1
    pull_policy: always
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidbox
    volumes:
      - aidbox-pg-data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  aidbox-pg-data:
