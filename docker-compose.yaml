services:
  aidbox:
    image: healthsamurai/aidboxone:edge
    pull_policy: always
    depends_on:
      aidbox-db:
        condition: service_healthy
    ports:
      - "8888:8888"
    environment:
      AIDBOX_LICENSE: ${AIDBOX_LICENSE}
      AIDBOX_FHIR_VERSION: 4.0.1
      AIDBOX_PORT: 8888
      AIDBOX_BASE_URL: http://localhost:8888
      PGHOST: aidbox-db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: aidbox
      AIDBOX_ADMIN_ID: admin
      AIDBOX_ADMIN_PASSWORD: admin
      AIDBOX_CLIENT_ID: root
      AIDBOX_CLIENT_SECRET: secret
      # Enable FHIR Schema validation engine (required for SQL on FHIR $run)
      AIDBOX_FHIR_SCHEMA_VALIDATION: "true"
      AIDBOX_FHIR_PACKAGES: "hl7.fhir.r4.core#4.0.1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  aidbox-db:
    image: healthsamurai/aidboxdb:16.1
    pull_policy: always
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidbox
    volumes:
      - aidbox-pg-data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  extraction-webhook:
    build:
      context: ./scripts
      dockerfile: Dockerfile.webhook
    depends_on:
      aidbox:
        condition: service_healthy
    environment:
      AIDBOX_URL: http://aidbox:8888
      AIDBOX_USER: root
      AIDBOX_PASSWORD: secret
    ports:
      - "8080:8080"

volumes:
  aidbox-pg-data:
