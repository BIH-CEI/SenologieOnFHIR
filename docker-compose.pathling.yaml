services:
  pathling:
    image: aehrc/pathling:latest
    ports:
      - "8090:8080"
    environment:
      pathling.storage.warehouseUrl: file:///tmp/warehouse
      pathling.query.cacheSize: "100"
      pathling.terminology.enabled: "false"
      JAVA_TOOL_OPTIONS: "-Xmx4g"
    volumes:
      - pathling-warehouse:/tmp/warehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pathling-warehouse:
