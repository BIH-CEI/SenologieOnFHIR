name: Build IG & Publish to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  checks: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll
        run: gem install jekyll

      - name: Cache FHIR packages
        uses: actions/cache@v4
        with:
          path: ~/.fhir/packages
          key: fhir-packages-${{ hashFiles('sushi-config.yaml') }}
          restore-keys: fhir-packages-

      - name: Cache IG Publisher JAR
        uses: actions/cache@v4
        id: cache-publisher
        with:
          path: input-cache/publisher.jar
          key: ig-publisher-latest

      - name: Download IG Publisher
        if: steps.cache-publisher.outputs.cache-hit != 'true'
        run: |
          mkdir -p input-cache
          curl -L -o input-cache/publisher.jar \
            https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar

      - name: Setup TX Proxy (MII Ontoserver)
        env:
          MII_TERMSERV_CERT: ${{ secrets.MII_TERMSERV_CERT }}
          MII_TERMSERV_PW: ${{ secrets.MII_TERMSERV_PW }}
        run: |
          mkdir -p nginx/certs
          curl -sSL -o nginx/nginx.conf \
            https://raw.githubusercontent.com/medizininformatik-initiative/kerndatensatz-meta/refs/heads/master/.github/workflows/nginx.conf
          echo "$MII_TERMSERV_CERT" | base64 -d > nginx/certs/client.p12
          openssl pkcs12 -in nginx/certs/client.p12 -clcerts -nokeys \
            -out nginx/certs/client-cert.pem -passin pass:$MII_TERMSERV_PW
          openssl pkcs12 -in nginx/certs/client.p12 -nocerts \
            -out nginx/certs/client-key-encrypted.key \
            -passin pass:$MII_TERMSERV_PW -passout pass:$MII_TERMSERV_PW
          openssl rsa -in nginx/certs/client-key-encrypted.key \
            -out nginx/certs/client-key.key -passin pass:$MII_TERMSERV_PW
          docker run -d --name nginx-proxy \
            -v $PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
            -v $PWD/nginx/certs:/etc/nginx/certs:ro \
            -p 8090:80 nginx:alpine
          sleep 5
          for i in {1..5}; do
            if curl --head --silent --fail http://localhost:8090; then
              echo "NGINX TX proxy is ready."
              break
            fi
            echo "Waiting for NGINX... attempt $i"
            sleep 2
          done

      - name: Build IG
        run: |
          chmod +x _genonce.sh
          ./_genonce.sh -tx http://localhost:8090/fhir

      - name: Render Validation Results
        if: always()
        uses: patrick-werner/validation-outcome-markdown-renderer@main
        with:
          bundle-file: output/qa.json
          include: errors
          filters: |
            # StructureMap BackboneElement paths (IG Publisher limitation)
            |SM_TARGET_PATH_INVALID||
            |SM_SOURCE_PATH_INVALID||
            |SM_RULEGROUP_NOT_FOUND||
            |SM_TARGET_CONTEXT_UNKNOWN||
            # OPS version undefined (MII Onko upstream)
            ||version 'undefined' in the ValueSet*|
            # TX-Proxy validate-code issues
            ||Type-level request to $validate-code*|
            ||A code/system pair must be provided*|
            # Known SNOMED/LOINC/RadLex unknown codes (TX server version)
            |UNKNOWN_CODE_IN_SYSTEM||
            # Slicing discriminator (Follow-Up redesign pending)
            ||Slicing kann nicht ausgewertet werden*|Observation.component*

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
