<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0077B6"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0077B6">Klinischer Erfassungsworkflow</text>

  <!-- Step 1: Diagnose -->
  <rect x="30" y="55" width="840" height="75" rx="8" fill="#E8F4F8" stroke="#0077B6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="78" font-size="11" font-weight="bold" fill="#0077B6">1. DIAGNOSE ANLEGEN</text>
  <rect x="50" y="88" width="140" height="32" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="120" y="108" text-anchor="middle" font-size="10" fill="#1A1A2E">Erstanamnese</text>
  <text x="210" y="108" font-size="14" fill="#0077B6">→</text>
  <rect x="230" y="88" width="160" height="32" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="310" y="108" text-anchor="middle" font-size="10" fill="#1A1A2E">Diagnose-Formular</text>
  <text x="410" y="108" font-size="14" fill="#0077B6">→</text>
  <rect x="430" y="88" width="120" height="32" rx="5" fill="#0077B6" stroke="#005F8A" stroke-width="1"/>
  <text x="490" y="108" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Condition</text>

  <!-- Arrow down -->
  <line x1="450" y1="130" x2="450" y2="160" stroke="#0077B6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="150" font-size="9" fill="#555555" font-style="italic">Bezugsdiagnose</text>

  <!-- Step 2: Befundungen -->
  <rect x="30" y="165" width="840" height="100" rx="8" fill="#E8F4F8" stroke="#0077B6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="188" font-size="11" font-weight="bold" fill="#0077B6">2. BEFUNDUNGEN HINZUFÜGEN</text>

  <!-- Klinisch -->
  <rect x="50" y="198" width="230" height="55" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="165" y="216" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A2E">Klinische Untersuchung</text>
  <rect x="80" y="226" width="80" height="20" rx="3" fill="#0077B6"/>
  <text x="120" y="240" text-anchor="middle" font-size="9" fill="#ffffff">Observation</text>

  <!-- Bildgebung -->
  <rect x="310" y="198" width="230" height="55" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="425" y="216" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A2E">Bildgebung</text>
  <rect x="330" y="226" width="90" height="20" rx="3" fill="#0077B6"/>
  <text x="375" y="240" text-anchor="middle" font-size="9" fill="#ffffff">Diagn.Report</text>
  <rect x="430" y="226" width="80" height="20" rx="3" fill="#0077B6"/>
  <text x="470" y="240" text-anchor="middle" font-size="9" fill="#ffffff">Observation</text>

  <!-- Pathologie -->
  <rect x="570" y="198" width="280" height="55" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="710" y="216" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A2E">Pathologie</text>
  <rect x="590" y="226" width="90" height="20" rx="3" fill="#0077B6"/>
  <text x="635" y="240" text-anchor="middle" font-size="9" fill="#ffffff">Diagn.Report</text>
  <rect x="688" y="226" width="76" height="20" rx="3" fill="#0077B6"/>
  <text x="726" y="240" text-anchor="middle" font-size="9" fill="#ffffff">Observation</text>
  <rect x="772" y="226" width="64" height="20" rx="3" fill="#0077B6"/>
  <text x="804" y="240" text-anchor="middle" font-size="9" fill="#ffffff">Specimen</text>

  <!-- Arrow down -->
  <line x1="450" y1="265" x2="450" y2="295" stroke="#0077B6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="285" font-size="9" fill="#555555" font-style="italic">Bezugsdiagnose / -operation</text>

  <!-- Step 3: Therapie -->
  <rect x="30" y="300" width="840" height="120" rx="8" fill="#E8F4F8" stroke="#0077B6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="323" font-size="11" font-weight="bold" fill="#0077B6">3. THERAPIE DOKUMENTIEREN</text>

  <!-- Tumorboard -->
  <rect x="50" y="333" width="130" height="50" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="115" y="351" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A2E">Tumorboard</text>
  <rect x="65" y="360" width="100" height="18" rx="3" fill="#0077B6"/>
  <text x="115" y="373" text-anchor="middle" font-size="9" fill="#ffffff">CarePlan</text>

  <!-- OP -->
  <rect x="200" y="333" width="200" height="75" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="300" y="351" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A2E">OP-Planung → Postoperativ</text>
  <rect x="215" y="360" width="75" height="18" rx="3" fill="#0077B6"/>
  <text x="252" y="373" text-anchor="middle" font-size="9" fill="#ffffff">Procedure</text>
  <rect x="298" y="360" width="55" height="18" rx="3" fill="#0077B6"/>
  <text x="325" y="373" text-anchor="middle" font-size="9" fill="#ffffff">Device</text>
  <rect x="360" y="360" width="30" height="18" rx="3" fill="#0077B6"/>
  <text x="375" y="373" text-anchor="middle" font-size="8" fill="#ffffff">Obs</text>
  <text x="300" y="400" text-anchor="middle" font-size="8" fill="#555555">ServiceRequest → Procedure, Device, Observation</text>

  <!-- Systemtherapie -->
  <rect x="430" y="333" width="200" height="50" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="530" y="351" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A2E">Systemtherapie</text>
  <rect x="445" y="360" width="75" height="18" rx="3" fill="#0077B6"/>
  <text x="482" y="373" text-anchor="middle" font-size="9" fill="#ffffff">Procedure</text>
  <rect x="528" y="360" width="88" height="18" rx="3" fill="#0077B6"/>
  <text x="572" y="373" text-anchor="middle" font-size="9" fill="#ffffff">MedStatement</text>

  <!-- Strahlentherapie -->
  <rect x="660" y="333" width="190" height="50" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="755" y="351" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A2E">Strahlentherapie</text>
  <rect x="700" y="360" width="75" height="18" rx="3" fill="#0077B6"/>
  <text x="737" y="373" text-anchor="middle" font-size="9" fill="#ffffff">Procedure</text>

  <!-- Arrow down -->
  <line x1="450" y1="420" x2="450" y2="450" stroke="#0077B6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Verlauf -->
  <rect x="30" y="455" width="840" height="55" rx="8" fill="#E8F4F8" stroke="#0077B6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="478" font-size="11" font-weight="bold" fill="#0077B6">4. VERLAUF / NACHSORGE</text>
  <rect x="50" y="488" width="130" height="14" rx="3" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <text x="115" y="499" text-anchor="middle" font-size="9" fill="#1A1A2E">Tumorstatus, Follow-Up</text>
  <text x="200" y="499" font-size="14" fill="#0077B6">→</text>
  <rect x="220" y="486" width="80" height="18" rx="3" fill="#0077B6"/>
  <text x="260" y="499" text-anchor="middle" font-size="9" fill="#ffffff">Observation</text>
</svg>
