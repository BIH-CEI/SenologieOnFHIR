<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0077B6"/>
    </marker>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0077B6">Vom Formular zu FHIR-Ressourcen</text>

  <!-- ============================================================ -->
  <!-- TOP ROW: 4 Phases -->
  <!-- ============================================================ -->

  <!-- Phase 1: Kontext -->
  <rect x="20" y="50" width="195" height="95" rx="8" fill="#0077B6" filter="url(#sh)"/>
  <text x="117" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">1. Kontext wählen</text>
  <line x1="35" y1="80" x2="200" y2="80" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="117" y="97" text-anchor="middle" font-size="9.5" fill="#E8F4F8">Patient / Encounter</text>
  <text x="117" y="112" text-anchor="middle" font-size="9.5" fill="#E8F4F8">Bezugsdiagnose</text>
  <text x="117" y="127" text-anchor="middle" font-size="9.5" fill="#E8F4F8">Bezugsoperation</text>
  <text x="117" y="141" text-anchor="middle" font-size="8" fill="#ffffff" font-style="italic">launchContext</text>

  <!-- Arrow 1→2 -->
  <line x1="215" y1="97" x2="238" y2="97" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 2: Vorbefüllung -->
  <rect x="243" y="50" width="195" height="95" rx="8" fill="#0077B6" filter="url(#sh)"/>
  <text x="340" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">2. Vorbefüllung</text>
  <line x1="258" y1="80" x2="423" y2="80" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="340" y="97" text-anchor="middle" font-size="9.5" fill="#E8F4F8">Bestehende Daten laden</text>
  <text x="340" y="112" text-anchor="middle" font-size="9.5" fill="#E8F4F8">Name, Geburtsdatum</text>
  <text x="340" y="127" text-anchor="middle" font-size="9.5" fill="#E8F4F8">Vordiagnosen, Befunde</text>
  <text x="340" y="141" text-anchor="middle" font-size="8" fill="#ffffff" font-style="italic">initialExpression (FHIRPath)</text>

  <!-- Arrow 2→3 -->
  <line x1="438" y1="97" x2="461" y2="97" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 3: Ausfüllen -->
  <rect x="466" y="50" width="195" height="95" rx="8" fill="#0077B6" filter="url(#sh)"/>
  <text x="563" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">3. Ausfüllen</text>
  <line x1="481" y1="80" x2="646" y2="80" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="563" y="97" text-anchor="middle" font-size="9.5" fill="#E8F4F8">Klinische Dokumentation</text>
  <text x="563" y="112" text-anchor="middle" font-size="9.5" fill="#E8F4F8">Dynamische Felder</text>
  <text x="563" y="127" text-anchor="middle" font-size="9.5" fill="#E8F4F8">Terminologie-Bindung</text>
  <text x="563" y="141" text-anchor="middle" font-size="8" fill="#ffffff" font-style="italic">enableWhen, answerValueSet</text>

  <!-- Arrow 3→4 -->
  <line x1="661" y1="97" x2="684" y2="97" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 4: Extraction -->
  <rect x="689" y="50" width="195" height="95" rx="8" fill="#005F8A" filter="url(#sh)"/>
  <text x="786" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">4. Extraction</text>
  <line x1="704" y1="80" x2="869" y2="80" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="786" y="97" text-anchor="middle" font-size="9.5" fill="#E8F4F8">Template-based Extraction</text>
  <text x="786" y="112" text-anchor="middle" font-size="9.5" fill="#E8F4F8">Blueprints auswerten</text>
  <text x="786" y="127" text-anchor="middle" font-size="9.5" fill="#E8F4F8">Platzhalter ersetzen</text>
  <text x="786" y="141" text-anchor="middle" font-size="8" fill="#ffffff" font-style="italic">templateExtract, templateExtractValue</text>

  <!-- ============================================================ -->
  <!-- BOTTOM: Example - Postoperative Dokumentation -->
  <!-- ============================================================ -->

  <text x="450" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#0077B6">Beispiel: Postoperative Dokumentation</text>

  <!-- Left: Filled form -->
  <rect x="20" y="192" width="280" height="155" rx="8" fill="#ffffff" stroke="#B0D4E3" stroke-width="1.5" filter="url(#sh)"/>
  <text x="160" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="#0077B6">Ausgefülltes Formular</text>

  <rect x="40" y="224" width="240" height="18" rx="3" fill="#E8F4F8" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="48" y="236" font-size="8.5" fill="#555555">Bezugsdiagnose: C50.4 links ▾</text>

  <rect x="40" y="248" width="240" height="18" rx="3" fill="#E8F4F8" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="48" y="260" font-size="8.5" fill="#555555">Eingriff: Brusterhaltende Therapie (BET) ▾</text>

  <rect x="40" y="272" width="240" height="18" rx="3" fill="#E8F4F8" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="48" y="284" font-size="8.5" fill="#555555">Axilla: Sentinel-LK-Biopsie ▾</text>

  <rect x="40" y="296" width="240" height="18" rx="3" fill="#E8F4F8" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="48" y="308" font-size="8.5" fill="#555555">Komplikation: Clavien-Dindo Grad I ▾</text>

  <rect x="40" y="320" width="240" height="18" rx="3" fill="#E8F4F8" stroke="#B0D4E3" stroke-width="0.5"/>
  <text x="48" y="332" font-size="8.5" fill="#555555">Implantat: ☐ ja  ☑ nein</text>

  <!-- Arrow Form → Blueprints -->
  <line x1="300" y1="270" x2="335" y2="270" stroke="#0077B6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="317" y="262" text-anchor="middle" font-size="8" fill="#555555" font-style="italic" transform="rotate(-90 317 262)"></text>

  <!-- Middle: Blueprints (part of Extraction) -->
  <rect x="340" y="192" width="260" height="155" rx="8" fill="#F0F8FB" stroke="#005F8A" stroke-width="1.5" filter="url(#sh)"/>
  <text x="470" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="#005F8A">Blueprints (Extraction)</text>

  <!-- Blueprint 1 -->
  <rect x="355" y="225" width="230" height="48" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <rect x="355" y="225" width="230" height="16" rx="5" fill="#005F8A"/>
  <text x="470" y="236" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#ffffff">Blueprint 1: postop-procedure-template</text>
  <text x="365" y="253" font-size="8.5" fill="#555555">Profil: Senologie_Operation</text>
  <text x="365" y="265" font-size="8" fill="#555555" font-style="italic">reasonReference ← Bezugsdiagnose</text>

  <!-- Blueprint 2 -->
  <rect x="355" y="282" width="230" height="48" rx="5" fill="#ffffff" stroke="#B0D4E3" stroke-width="1"/>
  <rect x="355" y="282" width="230" height="16" rx="5" fill="#005F8A"/>
  <text x="470" y="293" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#ffffff">Blueprint 2: postop-komplikation-template</text>
  <text x="365" y="310" font-size="8.5" fill="#555555">Profil: Senologie_Operative_Komplikation</text>
  <text x="365" y="322" font-size="8" fill="#555555" font-style="italic">code ← Clavien-Dindo</text>

  <!-- Arrow Blueprints → Resources -->
  <line x1="600" y1="270" x2="635" y2="270" stroke="#005F8A" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Right: FHIR Resources -->
  <rect x="640" y="192" width="244" height="155" rx="8" fill="#E8F4F8" stroke="#0077B6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="762" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="#0077B6">Erzeugte FHIR-Ressourcen</text>

  <!-- Resource 1: Procedure BET -->
  <rect x="660" y="224" width="205" height="32" rx="5" fill="#0077B6"/>
  <text x="762" y="238" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Procedure: BET</text>
  <text x="762" y="252" text-anchor="middle" font-size="7" fill="#E8F4F8">reasonReference → Condition/C50.4</text>

  <!-- Resource 2: Procedure SLNB -->
  <rect x="660" y="262" width="205" height="32" rx="5" fill="#0077B6"/>
  <text x="762" y="276" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Procedure: Sentinel-LK-Biopsie</text>
  <text x="762" y="290" text-anchor="middle" font-size="7" fill="#E8F4F8">partOf → Procedure/BET</text>

  <!-- Resource 3: Observation -->
  <rect x="660" y="300" width="205" height="32" rx="5" fill="#0077B6"/>
  <text x="762" y="314" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Observation: Komplikation</text>
  <text x="762" y="328" text-anchor="middle" font-size="7" fill="#E8F4F8">Clavien-Dindo I · focus → Procedure/BET</text>

  <!-- Legend -->
  <text x="450" y="375" text-anchor="middle" font-size="9" fill="#555555">Ein Formular → mehrere Blueprints → mehrere FHIR-Ressourcen</text>

  <!-- Bracket labels connecting to top phases -->
  <line x1="160" y1="155" x2="160" y2="192" stroke="#B0D4E3" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="160" y="185" text-anchor="middle" font-size="8" fill="#999999">Phase 3</text>

  <line x1="470" y1="155" x2="470" y2="192" stroke="#B0D4E3" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="470" y="185" text-anchor="middle" font-size="8" fill="#999999">Phase 4</text>

  <line x1="762" y1="155" x2="762" y2="192" stroke="#B0D4E3" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="762" y="185" text-anchor="middle" font-size="8" fill="#999999">Ergebnis</text>
</svg>
